name: Build and push telegram-bot image

on:
  push:
    paths:
      - 'bot/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the repository name automatically,
          # producing e.g. ghcr.io/l-eugene/torrentbot
          images: ghcr.io/${{ github.repository }}
          tags: |
            # short git SHA for every push, e.g. ghcr.io/l-eugene/torrentbot:abc1234
            type=sha,prefix=
            # 'latest' only on the default branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache layers in the GitHub Actions cache to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
