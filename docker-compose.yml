services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/London}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ./downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  telegram-bot:
    image: ghcr.io/l-eugene/torrentbot:latest
    container_name: telegram-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - QBIT_HOST=http://qbittorrent:8080
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
      - DOWNLOAD_PATH=/downloads
    volumes:
      - ./downloads:/downloads
    depends_on:
      - qbittorrent
    restart: unless-stopped

  samba:
    image: dperson/samba:latest
    container_name: samba
    environment:
      - TZ=${TZ:-Europe/London}
    command: >
      -s "downloads;/mnt/downloads;yes;yes;yes"
      -p
    volumes:
      - ./downloads:/mnt/downloads
    ports:
      - "139:139"
      - "445:445"
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    volumes:
      - ./config/jellyfin:/config
      - ./downloads:/media:ro
    ports:
      - "8096:8096"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  setup:
    image: python:3-alpine
    container_name: setup
    volumes:
      - ./setup.py:/setup.py:ro
      - ./config:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME:-admin}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD}
    depends_on:
      qbittorrent:
        condition: service_healthy
      jellyfin:
        condition: service_healthy
    command: python3 /setup.py
    restart: "no"
