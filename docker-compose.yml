services:
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/London}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ./downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  telegram-bot:
    build: ./bot
    container_name: telegram-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - QBIT_HOST=http://qbittorrent:8080
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD}
      - DOWNLOAD_PATH=/downloads
    volumes:
      - ./downloads:/downloads
    depends_on:
      - qbittorrent
    restart: unless-stopped

  samba:
    image: dperson/samba:latest
    container_name: samba
    environment:
      - TZ=${TZ:-Europe/London}
    command: >
      -s "downloads;/mnt/downloads;yes;yes;yes"
      -p
    volumes:
      - ./downloads:/mnt/downloads:ro
    ports:
      - "139:139"
      - "445:445"
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    volumes:
      - ./config/jellyfin:/config
      - ./downloads:/media:ro
    ports:
      - "8096:8096"
    restart: unless-stopped
